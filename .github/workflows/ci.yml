name: CI & Deploy

on:
  push:
    branches: [main, 'refactor/**', 'beta/**']
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  # Scope by event type so a `pull_request` sync run can't preempt the
  # `push` run that actually does the deploy (the `build` and `deploy`
  # jobs below are gated on `github.event_name == 'push'`).
  group: pages-${{ github.event_name }}
  cancel-in-progress: true

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache cargo registry & build
        uses: Swatinem/rust-cache@v2

      - name: Clippy (deny warnings)
        run: cargo clippy --all-targets -- -D warnings

      - name: Build
        run: cargo build --all-targets

      - name: Test
        run: cargo test

      # Advisory only: flags ROM offsets that bypass their rom_data.rs constant.
      # `continue-on-error` keeps the job green — this surfaces a nudge in the
      # step summary without blocking merges.
      - name: ROM offset duplication scan (advisory)
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          python3 tools/offset_dups.py --exit-code | tee -a "$GITHUB_STEP_SUMMARY"

  build:
    needs: ci
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

      - name: Checkout main
        uses: actions/checkout@v5
        with:
          ref: main
          path: main-src

      - name: Build main
        working-directory: main-src
        run: wasm-pack build --target web --out-dir pkg

      - name: Stage main into _site/
        run: |
          mkdir -p _site
          cp -r main-src/web/. _site/
          cp -r main-src/pkg _site/pkg

      - name: Checkout trigger ref
        if: github.ref != 'refs/heads/main'
        uses: actions/checkout@v5
        with:
          path: branch-src

      - name: Build trigger branch
        if: github.ref != 'refs/heads/main'
        working-directory: branch-src
        run: wasm-pack build --target web --out-dir pkg

      - name: Stage trigger branch into _site/beta/
        if: github.ref != 'refs/heads/main'
        run: |
          mkdir -p _site/beta
          cp -r branch-src/web/. _site/beta/
          cp -r branch-src/pkg _site/beta/pkg

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: _site

  deploy:
    needs: build
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
