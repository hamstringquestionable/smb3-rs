name: CI & Deploy

on:
  push:
    # Only main and the beta/next integration branch deploy. main -> root site,
    # beta/next -> /beta/. No other branch can touch the deployed site.
    branches: [main, 'beta/next']
  pull_request:
    # Run CI for feature PRs into beta/next as well as PRs into main.
    branches: [main, 'beta/next']
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  # Scope by event type so a `pull_request` sync run can't preempt the
  # `push` run that actually does the deploy (the `build` and `deploy`
  # jobs below are gated on `github.event_name == 'push'`).
  group: pages-${{ github.event_name }}
  cancel-in-progress: true

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache cargo registry & build
        uses: Swatinem/rust-cache@v2

      - name: Clippy (deny warnings)
        run: cargo clippy --all-targets -- -D warnings

      - name: Build
        run: cargo build --all-targets

      - name: Test
        run: cargo test

      # Advisory only: flags ROM offsets that bypass their rom_data.rs constant.
      # `continue-on-error` keeps the job green — this surfaces a nudge in the
      # step summary without blocking merges.
      - name: ROM offset duplication scan (advisory)
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          python3 tools/offset_dups.py --exit-code | tee -a "$GITHUB_STEP_SUMMARY"

  version-guard:
    # Every PR to main must bump the Cargo.toml version. The title-screen seed
    # hash folds in CARGO_PKG_VERSION, so a version bump is what makes two builds
    # with different randomization logic produce different verification icons.
    # Only enforced for PRs targeting main (the release PR beta/next -> main, or
    # any direct-to-main PR) — feature PRs into beta/next don't each need a bump.
    if: github.event_name == 'pull_request' && github.base_ref == 'main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0 # need base history to read main's Cargo.toml
      - name: Require a version bump
        shell: bash
        run: |
          set -euo pipefail
          ver() { sed -n 's/^version = "\(.*\)"/\1/p' "$1" | head -1; }
          git show '${{ github.event.pull_request.base.sha }}:Cargo.toml' > /tmp/base-cargo.toml
          base=$(ver /tmp/base-cargo.toml)
          head=$(ver Cargo.toml)
          echo "base version: $base"
          echo "head version: $head"
          if [ "$base" = "$head" ]; then
            echo "::error file=Cargo.toml::Version unchanged ($head). Bump the version before merging to main."
            exit 1
          fi
          # Enforce a strictly-increasing version (highest sorts last).
          highest=$(printf '%s\n%s\n' "$base" "$head" | sort -V | tail -1)
          if [ "$highest" != "$head" ]; then
            echo "::error file=Cargo.toml::Version $head is not greater than main's $base."
            exit 1
          fi

  build:
    needs: ci
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    # `contents: write` so the archive step can push frozen version snapshots to
    # the `site-versions` branch. `pages`/`id-token` retained for the artifact.
    permissions:
      contents: write
      pages: write
      id-token: write
    steps:
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

      - name: Checkout main
        uses: actions/checkout@v5
        with:
          ref: main
          path: main-src

      - name: Build main
        working-directory: main-src
        run: wasm-pack build --target web --out-dir pkg

      - name: Stage main into _site/
        run: |
          mkdir -p _site
          cp -r main-src/web/. _site/
          cp -r main-src/pkg _site/pkg

      # Beta page: ALWAYS built from the beta/next integration branch, whatever
      # triggered this run. This locks /beta/ to beta/next and keeps it stable —
      # a main deploy no longer wipes it, and no other branch can clobber it.
      - name: Checkout beta/next
        uses: actions/checkout@v5
        with:
          ref: beta/next
          path: beta-src

      - name: Build beta/next
        working-directory: beta-src
        run: wasm-pack build --target web --out-dir pkg

      - name: Stage beta/next into _site/beta/
        run: |
          mkdir -p _site/beta
          cp -r beta-src/web/. _site/beta/
          cp -r beta-src/pkg _site/beta/pkg

      # Freeze each main version at /v/<version>/ and carry the whole archive
      # forward into every deploy. Only the current version is ever built (above);
      # prior versions are copied verbatim from the `site-versions` branch, so
      # build time stays flat no matter how many versions accumulate.
      - name: Archive version snapshot and stage version history
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          VER=$(sed -n 's/^version = "\(.*\)"/\1/p' main-src/Cargo.toml | head -1)
          echo "Main version: $VER"
          REMOTE="https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"

          # Fetch the archive branch, or start it empty if it does not exist yet.
          if git clone --branch site-versions --single-branch "$REMOTE" versions-repo 2>/dev/null; then
            echo "Fetched site-versions branch."
          else
            echo "site-versions branch absent; creating a fresh archive."
            git clone "$REMOTE" versions-repo
            ( cd versions-repo
              git checkout --orphan site-versions
              git rm -rf . >/dev/null 2>&1 || true
              mkdir -p v )
          fi

          cd versions-repo
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # Snapshot only from a main push, and only once per version (never overwrite).
          if [ "$GITHUB_REF" = "refs/heads/main" ] && [ ! -d "v/$VER" ]; then
            mkdir -p "v/$VER"
            cp -r ../main-src/web/. "v/$VER/"
            cp -r ../main-src/pkg   "v/$VER/pkg"
            git add -A
            git commit -m "archive v$VER"
            git push origin site-versions
            echo "Archived v$VER."
          else
            echo "No new snapshot (ref=$GITHUB_REF, v/$VER exists: $( [ -d "v/$VER" ] && echo yes || echo no ))."
          fi
          cd ..

          # Carry every archived version into the deploy (file copy, no rebuild).
          mkdir -p _site/v
          if [ -n "$(ls -A versions-repo/v 2>/dev/null)" ]; then
            cp -r versions-repo/v/. _site/v/
          fi

          # Manifest for the in-app version picker (newest first).
          ARR=$(ls versions-repo/v 2>/dev/null | sort -Vr | sed 's/.*/"&"/' | paste -sd, -)
          printf '{"current":"%s","versions":[%s]}\n' "$VER" "$ARR" > _site/versions.json
          cat _site/versions.json

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: _site

  deploy:
    needs: build
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
