<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>SMB3 CHR Viewer (debug)</title>
<style>
body { background: #141428; color: #e0e0e0; font-family: ui-monospace, Menlo, monospace; padding: 1rem; }
h1 { color: #5c94fc; margin: 0 0 0.5rem; font-size: 1rem; }
.controls { margin-bottom: 1rem; }
.controls label { color: #9a9ab0; font-size: 0.8rem; margin-right: 1rem; }
.controls input, .controls select { background: #1c1c38; color: #e0e0e0; border: 1px solid #2a2a50; border-radius: 4px; padding: 0.25rem 0.5rem; font-family: inherit; }
.page-row { display: grid; grid-template-columns: 80px 1fr 1fr; gap: 1rem; align-items: start; margin-bottom: 0.5rem; }
.page-label { color: #5c94fc; font-weight: bold; padding-top: 0.25rem; }
.page-grid { background: #000; padding: 4px; image-rendering: pixelated; cursor: crosshair; }
.tile-info { background: #1c1c38; border: 1px solid #2a2a50; padding: 0.5rem; min-height: 100px; font-size: 0.75rem; color: #9a9ab0; }
.tile-info .id { color: #e44434; font-size: 1rem; font-weight: bold; }
.tile-info canvas { image-rendering: pixelated; background: #444; margin-top: 0.5rem; }
.note { color: #777; font-size: 0.7rem; }
</style>
</head>
<body>
<h1>SMB3 CHR Viewer (debug)</h1>
<div class="controls">
  <label>ROM: <input type="file" id="rom-input" accept=".nes"></label>
  <label>Palette: <input type="text" id="palette" value="0F,16,27,36" size="14"></label>
  <label>Page range: <input type="text" id="pages" value="0-31" size="6"></label>
  <span class="note">Click a tile to inspect. Palette is 4 NES color indices in hex.</span>
</div>
<div id="output"></div>

<script type="module">
import { CHR_BASE, decodeTile, resolvePalette, renderTileToCanvas } from "./chr.js";

const romInput = document.getElementById("rom-input");
const paletteInput = document.getElementById("palette");
const pagesInput = document.getElementById("pages");
const out = document.getElementById("output");
let rom = null;

// ROM cache via IndexedDB (mirrors app.js)
const DB = "smb3-rs", STORE = "rom";
function openDb() { return new Promise((res, rej) => { const r = indexedDB.open(DB, 1); r.onupgradeneeded = () => r.result.createObjectStore(STORE); r.onsuccess = () => res(r.result); r.onerror = () => rej(r.error); }); }
async function loadRom() { const db = await openDb(); return new Promise(res => { const tx = db.transaction(STORE, "readonly"); const r = tx.objectStore(STORE).get("data"); r.onsuccess = () => res(r.result || null); r.onerror = () => res(null); }); }

function parsePalette(s) {
  return s.split(",").map(p => parseInt(p.trim(), 16) & 0x3F);
}

function parseRange(s) {
  const m = s.match(/^(\d+)-(\d+)$/);
  if (m) { return [+m[1], +m[2]]; }
  const n = parseInt(s, 10);
  return isNaN(n) ? [0, 31] : [n, n];
}

function renderPage(pageIdx, palette) {
  const canvas = document.createElement("canvas");
  canvas.className = "page-grid";
  const tilesPerRow = 16;
  const rows = 16;
  const scale = 2;
  canvas.width = tilesPerRow * 8 * scale;
  canvas.height = rows * 8 * scale;
  const ctx = canvas.getContext("2d");
  ctx.imageSmoothingEnabled = false;
  const off = document.createElement("canvas");
  off.width = 8; off.height = 8;
  const offCtx = off.getContext("2d");
  for (let t = 0; t < 256; t++) {
    const tileId = pageIdx * 256 + t;
    const img = decodeTile(rom, tileId, resolvePalette(palette));
    offCtx.putImageData(img, 0, 0);
    const tx = (t % tilesPerRow) * 8 * scale;
    const ty = Math.floor(t / tilesPerRow) * 8 * scale;
    ctx.drawImage(off, tx, ty, 8 * scale, 8 * scale);
  }
  canvas.addEventListener("click", (e) => {
    const rect = canvas.getBoundingClientRect();
    const x = Math.floor((e.clientX - rect.left) / (8 * scale));
    const y = Math.floor((e.clientY - rect.top) / (8 * scale));
    const t = y * tilesPerRow + x;
    const tileId = pageIdx * 256 + t;
    showTileInfo(tileId, palette);
  });
  return canvas;
}

let infoEl = null;
function showTileInfo(tileId, palette) {
  if (!infoEl) return;
  const offset = CHR_BASE + tileId * 16;
  // Both 8x8 and metasprite (4-tile) preview
  const tileCanvas = document.createElement("canvas");
  tileCanvas.style.width = "64px"; tileCanvas.style.height = "64px";
  renderTileToCanvas(tileCanvas, rom, tileId, resolvePalette(palette));
  const metaCanvas = document.createElement("canvas");
  metaCanvas.width = 16; metaCanvas.height = 16;
  metaCanvas.style.width = "64px"; metaCanvas.style.height = "64px";
  const metaCtx = metaCanvas.getContext("2d");
  metaCtx.imageSmoothingEnabled = false;
  // Show as 2x2 metasprite assuming sequential tile IDs (tl, tr, bl, br) = (t, t+1, t+16, t+17) which is the typical SMB3 8x8-pair layout
  const off = document.createElement("canvas");
  off.width = 8; off.height = 8;
  const offCtx = off.getContext("2d");
  const positions = [[0,0],[8,0],[0,8],[8,8]];
  const tids = [tileId, tileId+1, tileId+16, tileId+17];
  for (let i = 0; i < 4; i++) {
    if (tids[i] >= 0x2000) continue;
    offCtx.putImageData(decodeTile(rom, tids[i], resolvePalette(palette)), 0, 0);
    metaCtx.drawImage(off, positions[i][0], positions[i][1]);
  }
  infoEl.innerHTML = "";
  infoEl.appendChild(Object.assign(document.createElement("div"), { className: "id", textContent: `tile 0x${tileId.toString(16).toUpperCase().padStart(4, "0")} (page 0x${(tileId>>8).toString(16)}, intra-page 0x${(tileId&0xFF).toString(16).padStart(2,"0")})` }));
  infoEl.appendChild(Object.assign(document.createElement("div"), { textContent: `file offset 0x${offset.toString(16).toUpperCase()}` }));
  infoEl.appendChild(Object.assign(document.createElement("div"), { textContent: "single tile:" }));
  infoEl.appendChild(tileCanvas);
  infoEl.appendChild(Object.assign(document.createElement("div"), { textContent: `2×2 metasprite (sequential, t/t+1/t+16/t+17 = ${tids.map(t=>"0x"+t.toString(16)).join(",")}):` }));
  infoEl.appendChild(metaCanvas);
}

function rerender() {
  if (!rom) return;
  const palette = parsePalette(paletteInput.value);
  const [pStart, pEnd] = parseRange(pagesInput.value);
  out.innerHTML = "";
  // Side panel for tile inspection (sticky)
  const panel = document.createElement("div");
  panel.style.cssText = "position:fixed; top:1rem; right:1rem; width:200px;";
  infoEl = document.createElement("div");
  infoEl.className = "tile-info";
  infoEl.textContent = "Click a tile to inspect.";
  panel.appendChild(infoEl);
  document.body.appendChild(panel);

  for (let p = pStart; p <= pEnd; p++) {
    const row = document.createElement("div");
    row.className = "page-row";
    row.appendChild(Object.assign(document.createElement("div"), { className: "page-label", textContent: `page 0x${p.toString(16).toUpperCase().padStart(2, "0")}` }));
    row.appendChild(renderPage(p, palette));
    out.appendChild(row);
  }
}

romInput.addEventListener("change", async (e) => {
  const file = e.target.files[0];
  if (!file) return;
  rom = new Uint8Array(await file.arrayBuffer());
  rerender();
});
paletteInput.addEventListener("change", rerender);
pagesInput.addEventListener("change", rerender);

// Try to use cached ROM
loadRom().then(b => { if (b) { rom = b; rerender(); } });
</script>
</body>
</html>
